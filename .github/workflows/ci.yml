name: CI Pipeline

on:
  push:
    branches:
      - 'bugfix/*'
      - 'feature/*'
      - 'hotfix/*'
      - 'modulos/*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

# Permissões da nossa pipeline
permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    name: Tests runner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Configuração dos passos que compõem o job
    steps:
      # 1. Faz o download do repositório
      - uses: actions/checkout@v4
      # 2. Configurar a JDK na máquina
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      # 3. Executar os testes
      - name: Run tests
        run: ./gradlew test
